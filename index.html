<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@300&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:crosshair;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Inter,sans-serif;
background:#000;
color:#fff;
overflow:hidden;
}

/* Background */
body::before{
content:"";
position:fixed;
inset:0;
background:url("https://files.catbox.moe/4ry366.gif") center/cover no-repeat;
filter:grayscale(1) brightness(.28) blur(6px);
z-index:-2;
}

/* CRT */
.tv-effect{
position:fixed;
inset:0;
pointer-events:none;
background:
linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,.18) 50%),
linear-gradient(90deg, rgba(255,0,0,.03), rgba(0,255,0,.01), rgba(0,0,255,.03));
background-size:100% 3px,3px 100%;
opacity:.6;
}

/* Enter */
#enter{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
transition:.6s;
}

#enter.hidden{
opacity:0;
pointer-events:none;
}

.enter-text{
font-family:"JetBrains Mono",monospace;
font-size:12px;
letter-spacing:4px;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{opacity:.35;}
}

/* Card */
.card{
width:355px;
padding:28px;
border-radius:14px;
background:rgba(10,10,10,.72);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.08);
text-align:center;
transition:transform .1s ease;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

/* Avatar */
.avatar{
width:92px;
height:92px;
margin:0 auto 15px;
overflow:hidden;
border:1px solid rgba(255,255,255,.18);
border-radius:50%;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-size:21px;
font-weight:700;
}

.status{
font-family:"JetBrains Mono",monospace;
font-size:11px;
letter-spacing:2px;
margin-top:6px;
color:#ff3333;
}

.bio{
margin:18px 0;
font-size:13px;
color:rgba(255,255,255,.62);
line-height:1.5;
}

/* Links */
.links{
display:flex;
flex-direction:column;
gap:8px;
}

.links a{
padding:10px;
font-size:11px;
text-decoration:none;
color:rgba(255,255,255,.82);
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.03);
transition:.25s;
}

.links a:hover{
background:#fff;
color:#000;
}

/* Discord Box */
.discord-box{
margin-top:15px;
padding:14px;
border-radius:12px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
text-align:left;
font-size:12px;
}

.discord-top{
display:flex;
align-items:center;
gap:10px;
}

.discord-pfp{
width:44px;
height:44px;
border-radius:50%;
object-fit:cover;
}

.discord-name{
font-weight:700;
font-size:14px;
}

.discord-tag{
font-size:11px;
color:#999;
}

.discord-status{
font-size:11px;
margin-top:2px;
color:#43b581;
text-transform:capitalize;
}

.discord-activity{
margin-top:10px;
color:#ccc;
line-height:1.4;
}

/* Spotify */
iframe{
width:100%;
height:80px;
margin-top:15px;
border-radius:10px;
filter:invert(1) grayscale(1) opacity(.82);
border:none;
}
</style>
</head>

<body>

<div id="enter">

<a href="https://youtu.be/uF5muSPTsQk">CLICK ME :3</a>
</div>

<!-- LIVE DISCORD -->
<div class="discord-box" id="discordBox">
loading discord...

<!-- Spotify -->
<iframe src="https://open.spotify.com/embed/track/23TRkuRH6Z4wfzKFUBNFyO"></iframe>

</div>

<audio id="audio" loop>
<source src="sound.mp3" type="audio/mpeg">

<script>
const card = document.getElementById("card");
const enter = document.getElementById("enter");
const audio = document.getElementById("audio");

/* Enter */
enter.onclick = () => {
    enter.classList.add("hidden");
    audio.play().catch(()=>{});
};

/* Mouse Tilt */
document.onmousemove = e => {
    const x = (e.clientX / innerWidth - .5) * 12;
    const y = (e.clientY / innerHeight - .5) * -12;
    card.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
};

/* Live Discord Presence */
async function loadDiscord(){
    try{
        const userId = "1407982946220118116";
        const res = await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
        const json = await res.json();
        const d = json.data;

        const avatar = `https://cdn.discordapp.com/avatars/${d.discord_user.id}/${d.discord_user.avatar}.png`;

        let activity = "currently larping...";
        if(d.listening_to_spotify){
            activity = `listening to ${d.spotify.song}`;
        } else if(d.activities.length > 0){
            activity = d.activities[d.activities.length - 1].name;
        }

        document.getElementById("discordBox").innerHTML = `
            <div class="discord-top">
                <img class="discord-pfp" src="${avatar}">
                <div>
                    <div class="discord-name">${d.discord_user.display_name || d.discord_user.username}</div>
                    <div class="discord-tag">@${d.discord_user.username}</div>
                    <div class="discord-status">● ${d.discord_status}</div>
                </div>
            </div>

            <div class="discord-activity">
                ${activity}
            </div>
        `;
    }catch(err){
        document.getElementById("discordBox").innerHTML = "discord status unavailable.";
    }
}

loadDiscord();
setInterval(loadDiscord,15000);
</script>

</body>
</html>
