*{

body{

    font-size:12px;
    letter-spacing:4px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{opacity:.3;}
}

/* Card */
.card{
    width:340px;
    padding:28px;
    background:rgba(10,10,10,.75);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(8px);
    border-radius:12px;
    text-align:center;
    transition:.1s ease;
}

/* Avatar */
.avatar{
    width:90px;
    height:90px;
    margin:0 auto 15px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.2);
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Text */
.name{
    font-size:20px;
    font-weight:700;
}

.status{
    font-family:"JetBrains Mono",monospace;
    font-size:11px;
    color:#ff3333;

.bio{

    color:rgba(255,255,255,.8);

.links a:hover{

    border-radius:10px;

.discord-pfp{

.discord-activity{

/* Spotify */
iframe{

    margin-top:15px;
