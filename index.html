<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>larp-hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  overflow: hidden;
}

video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<video id="splash" autoplay muted playsinline>
  <source src="splash.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("splash");

video.addEventListener("ended", () => {
  window.location.href = "/k1tt7/";
});

// fallback in case video fails
setTimeout(() => {
  window.location.href = "/k1tt7/";
}, 15000);
</script>

</body>
</html>
