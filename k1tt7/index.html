function i(){

let n=document.getElementById("snowCanvas");

s=Array.from({length:100},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+1,v:Math.random()+.5}))

function d(){
let n=document.getElementById("snowCanvas"),t=n.getContext("2d");
t.clearRect(0,0,w,h);
t.fillStyle="rgba(255,255,255,.6)";
t.beginPath();
s.forEach(f=>{t.moveTo(f.x,f.y);t.arc(f.x,f.y,f.r,0,Math.PI*2)});

if(f.y>h){f.y=-10;f.x=Math.random()*w}
});

}
